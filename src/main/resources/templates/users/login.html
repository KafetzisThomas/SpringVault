<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" th:href="@{/main.css}">

    <title>Login</title>
</head>

<body class="d-flex flex-column min-vh-100">
    <main class="flex-grow-1 d-flex align-items-center justify-content-center">
        <div class="card p-4 shadow" style="min-width: 350px; max-width: 400px; width: 100%;">
            <h3 class="text-center mb-4">Login</h3>

            <form action="#" th:action="@{/authenticateTheUser}" method="POST">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <!-- Check for successful registration -->
                <div th:if="${registered}" class="mb-2">
                    <i class="text-success">Registration successful. Please sign in.</i>
                </div>

                <!-- Check for login error -->
                <div th:if="${param.error}" class="mb-2">
                    <i class="text-danger">Sorry! You entered invalid username/password.</i>
                </div>

                <!-- Logout message -->
                <div th:if="${param.logout}" class="mb-2">
                    <i class="text-success">You have been logged out.</i>
                </div>

                <div class="mb-3">
                    <label for="UsernameInput" class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" id="UsernameInput" required autofocus>
                </div>

                <div class="mb-3">
                    <label for="PasswordInput" class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" id="PasswordInput" required>
                </div>

                <button type="submit" class="btn btn-primary w-100">Login</button>

                <p class="mt-4">Don't have an account? <a th:href="@{/register}">Register</a></p>
            </form>

        </div>
    </main>

    <div th:replace="~{base :: footer('')}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous">
    </script>

</body>

</html>
