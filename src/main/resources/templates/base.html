<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title}">SpringVault</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" type="text/css" th:href="@{/main.css}">
</head>
<body>
    <!-- navbar start -->
     <div th:fragment="navbar">
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
            <div class="container">
                <a class="navbar-brand" th:href="@{/}">SpringVault</a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav me-auto">
                        <li class="nav-item">
                            <a class="nav-link" th:classappend="${request?.requestURI == request?.contextPath + '/'} ? ' active' : ''" th:href="@{/}">Documents</a>
                        </li>
                    </ul>

                    <div class="d-flex gap-2">
                        <a th:href="@{/document/upload}" class="btn btn-success btn-sm"><i class="bi bi-cloud-arrow-up me-1"></i> Upload New</a>
                        <form th:action="@{/logout}" method="POST">
                            <button type="submit" class="btn btn-outline-light btn-sm"><i class="bi bi-box-arrow-right"></i> Logout</button>
                        </form>
                    </div>
                </div>
            </div>
        </nav>
    </div>
    <!-- navbar end -->

    <!-- footer start -->
    <footer th:fragment="footer" class="footer text-dark py-3 text-center fixed-bottom">
        <hr class="border-dark mb-1">
        <p class="mb-0">&copy; 2026 KafetzisThomas</p>
    </footer>
    <!-- footer end -->

    <th:block th:fragment="scripts">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    </th:block>
</body>
</html>
