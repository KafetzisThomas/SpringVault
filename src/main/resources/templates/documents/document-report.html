<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" type="text/css" th:href="@{/main.css}">

    <title>Document Report</title>
</head>

<body>

    <div class="container mt-5">
        <h3 class="mt-5 text-center">Document Report</h3>

        <!-- Success Message -->
        <div th:if="${successMessage}" class="alert alert-success text-center" th:text="${successMessage}"></div>

        <!-- Error Message -->
        <div th:if="${errorMessage}" class="alert alert-danger text-center" th:text="${errorMessage}"></div>

        <hr class="border-dark">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="mb-0">Your Documents</h4>

            <div class="d-flex gap-2">
                <a th:href="@{/document/upload}" class="btn btn-success">
                    <i class="bi bi-upload"></i> Upload Document
                </a>

                <form th:action="@{/logout}" method="POST" class="d-inline">
                    <button type="submit" class="btn btn-danger">
                        <i class="bi bi-box-arrow-left"></i>
                    </button>
                </form>
            </div>

        </div>

        <table class="table table-bordered table-striped">
            <thead class="table-dark">
                <tr class="text-center">
                    <th>FILENAME</th>
                    <th>CONTENT TYPE</th>
                    <th>UPLOADED AT</th>
                    <th>VIEW</th>
                    <th>DOWNLOAD</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="document : ${documents}">
                    <td class="text-center" th:text="${document.filename}" />
                    <td class="text-center" th:text="${document.contentType}" />
                    <td class="text-center" th:text="${#temporals.format(document.uploadedAt.atZone(T(java.time.ZoneId).systemDefault()), 'MMM. d, yyyy, h:mm a')}" />
                    <td class="text-center">
                        <a th:href="@{/document/view(id=${document.id})}" target="_blank" class="btn btn-sm btn-info">
                            <i class="bi bi-eye"></i> View
                        </a>
                    </td>
                    <td class="text-center">
                        <a th:href="@{/document/download(id=${document.id})}" class="btn btn-sm btn-primary">
                            <i class="bi bi-download"></i> Download
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div th:replace="~{base :: footer('')}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous">
    </script>

</body>

</html>
