<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{base :: head('Upload Document')}"></head>

<body class="bg-light d-flex flex-column min-vh-100">
    <div th:replace="~{base :: navbar}"></div>

    <div class="container flex-grow-1 d-flex align-items-center justify-content-center">
        <div class="row w-100 justify-content-center">
            <div class="col-md-6 col-lg-5">
                
                <div class="card shadow border-0">
                    <div class="card-body p-4 text-center">
                        <div class="mb-4">
                            <i class="bi bi-cloud-arrow-up text-primary fs-1"></i>
                            <h3 class="fw-bold">Upload File</h3>
                            <p class="text-muted small">Select a document to securely store in the vault.</p>
                        </div>

                        <form th:action="@{/document/add}" enctype="multipart/form-data" method="POST">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                            <div class="mb-4 text-start">
                                <label for="FileInput" class="form-label fw-bold small text-uppercase text-muted">Select Document</label>
                                <input type="file" name="file" class="form-control form-control-lg" id="FileInput"
                                       accept=".pdf,.doc,.docx,.odt,.txt,.xls,.xlsx,.csv,.ppt,.pptx" required>
                                <div class="form-text">Supported: PDF, Word, Excel, Text, PowerPoint</div>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 py-2 fw-medium shadow-sm">
                                <i class="bi bi-upload me-2"></i> Upload Now
                            </button>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <th:block th:replace="~{base :: footer}"></th:block>

    <th:block th:replace="~{base :: scripts}"></th:block>
</body>
</html>
