<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <title>Upload Document</title>
</head>

<body class="container mt-4">
    <h1 class="mb-4">Upload Document</h1>

    <div class="mb-3">
        <a th:href="@{/}" class="btn btn-secondary">
            <i class="bi bi-arrow-left"></i> Back to Documents
        </a>
    </div>

    <form action="#" th:action="@{/document/add}" enctype="multipart/form-data" method="POST" class="mb-3">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <div class="mb-3">
            <label for="FileInput" class="form-label">Document</label>
            <input type="file" name="file" class="form-control" id="FileInput"
                   accept=".pdf,.doc,.docx,.odt,.txt,.xls,.xlsx,.csv,.ppt,.pptx"
                   required>
        </div>

        <button type="submit" class="btn btn-primary w-100">Upload</button>

    </form>

    <div th:replace="~{base :: footer('fixed-bottom')}"></div>

</body>

</html>
