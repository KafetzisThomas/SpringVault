<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{base :: head('My Documents')}"></head>

<body class="bg-light">
    <div th:replace="~{base :: navbar}"></div>

    <div class="container">        
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i> <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i> <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                <h4 class="mb-0 text-dark fw-bold"><i class="bi bi-folder2-open me-2"></i>My Documents</h4>
            </div>

            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover table-striped mb-0 align-middle">
                        <thead class="table-light">
                            <tr class="text-uppercase small text-secondary">
                                <th class="ps-4">Filename</th>
                                <th>Type</th>
                                <th>Uploaded</th>
                                <th class="text-end pe-4">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(documents)}">
                                <td colspan="4" class="text-center py-5 text-muted">
                                    <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                                    No documents found. Start by uploading one.
                                </td>
                            </tr>

                            <tr th:each="document : ${documents}">
                                <td class="ps-4 fw-medium">
                                    <i class="bi bi-file-earmark-text me-2 text-primary"></i>
                                    <span th:text="${document.filename}"></span>
                                </td>
                                <td>
                                    <span class="badge bg-secondary bg-opacity-10 text-secondary border border-secondary border-opacity-25" th:text="${document.contentType}"></span>
                                </td>
                                <td class="text-muted small" 
                                    th:text="${#temporals.format(document.uploadedAt.atZone(T(java.time.ZoneId).systemDefault()), 'MMM d, yyyy • h:mm a')}">
                                </td>
                                <td class="text-end pe-4">
                                    <div class="btn-group btn-group-sm" role="group">
                                        <a th:href="@{/document/view(id=${document.id})}" target="_blank" class="btn btn-outline-primary" title="View">
                                            <i class="bi bi-eye"></i>
                                        </a>
                                        <a th:href="@{/document/download(id=${document.id})}" class="btn btn-outline-primary" title="Download">
                                            <i class="bi bi-download"></i>
                                        </a>
                                        <form th:action="@{/document/delete}" method="POST" class="d-inline">
                                            <input type="hidden" name="id" th:value="${document.id}" />
                                            <button type="submit" class="btn btn-outline-danger btn-sm rounded-start-0" title="Delete" 
                                                    onclick="return confirm('Are you sure you want to delete this document?');">
                                                <i class="bi bi-trash"></i>
                                            </button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="card-footer bg-light text-muted small text-center">
                <span th:text="${documents != null ? documents.size() : 0}"></span> documents stored
            </div>
        </div>
    </div>

    <th:block th:replace="~{base :: footer}"></th:block>

    <th:block th:replace="~{base :: scripts}"></th:block>
</body>
</html>
