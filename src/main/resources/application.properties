spring.application.name=SecureDocumentVault
spring.main.banner-mode=off
logging.level.root=warn
logging.level.org.springframework.security=DEBUG

spring.datasource.url=jdbc:postgresql://localhost:5432/securedocumentvault
spring.datasource.username=postgres
spring.datasource.password=postgres

# Hibernate DDL auto config
# create: drop and recreate tables each time (not for production)
# update: keep existing data, update schema
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# File upload
spring.servlet.multipart.max-file-size=256MB
spring.servlet.multipart.max-request-size=256MB
spring.servlet.multipart.enabled=true

# Encryption key for documents data encryption
# This is a test key for now:
document.encryption.secret=tqijNvw44grKsInsbQOKK02sfsBKpywqTFNTWDrLRPE=

# Enable all endpoints for actuator
management.endpoints.web.exposure.include=*

# ------------ Usefull actuator endpoints ------------
# /beans: returns all available beans in our BeanFactory
# /env: returns current environment properties
# /health: summarizes the health status of our application
# /metrics: details metrics of our application
# /loggers: enables us to query and modify the logging level of our application
# /threaddump: dumps the thread information of the underlying JVM
